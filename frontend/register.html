<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | ChatSphere</title>

    <link rel="stylesheet" href="css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="container">
        <section class="auth-card">
            <div class="logo">
                💬
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">
                Join ChatSphere and start chatting instantly.
            </p>
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password"
                            required>
                        <button type="button" id="togglePassword" class="eye-btn">
                            <img src="assets/eyeclosed.png" alt="Show Password" class="eye-icon">
                        </button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">
                        Confirm Password
                    </label>
                    <div class="password-box">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password"
                            autocomplete="new-password" required>
                        <button type="button" id="toggleConfirmPassword" class="eye-btn">
                            <img src="assets/eyeclosed.png" alt="Show Password" class="eye-icon">
                        </button>
                    </div>
                </div>
                <p id="message" class="message"></p>
                <button id="registerBtn" class="primary-btn" type="submit">
                    Create Account
                </button>
            </form>
            <p class="switch-page">
                Already have an account?
                <a href="login.html">
                    Sign In
                </a>
            </p>
        </section>
    </main>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
