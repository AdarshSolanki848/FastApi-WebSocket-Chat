<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-details">
                    <h3 id="username">Username</h3>
                    <p id="status">Online</p>
                </div>
            </div>
            <div class="sidebar-actions">
                <button id="logout-btn">
                   <i data-lucide="log-out"></i>
                </button>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="conversation-search" placeholder="Search conversations...">
        </div>
        <div class="conversation-list" id="conversation-list">
            <div class="conversation-item">
                <div class="conversation-avatar">
                    A
                </div>
                <div class="conversation-info">
                    <div class="conversation-top">
                        <h3 class="conversation-name">Alice</h3>
                        <span class="conversation-time">10:42 AM</span>
                    </div>
                    <div class="conversation-bottom">
                        <p class="last-message">
                            Hey! Are we meeting tomorrow?
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <button id="new-conversation-btn">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-info">
                <div class="chat-avatar">
                    A
                </div>

                <div class="chat-details">
                    <h2 id="chat-name">Select a Conversation</h2>
                    <p id="chat-status">No conversation selected</p>
                </div>
            </div>
            <div class="chat-actions">
                <button id="add-member-btn">
                    <i data-lucide="user-plus"></i>
                </button>
                <button id="chat-menu-btn">
                    <i data-lucide="ellipsis-vertical"></i>
                </button>
                </button>
            </div>
        </div>
        <div class="messages-container" id="messages-container">
            <div class="empty-chat">
                <div class="empty-chat-icon">
                    💬
                </div>
                <h2>Select a Conversation</h2>
                <p>
                    Choose a conversation from the sidebar
                    or create a new one.
                </p>
            </div>
            <!-- <div class="message-row incoming">
                <div class="message-bubble">
                    <p class="message-content">
                        Hey! How are you?
                    </p>
                    <span class="message-time">
                        10:35 AM
                    </span>
                </div>
            </div>
            <div class="message-row outgoing">
                <div class="message-bubble">
                    <p class="message-content">
                        I'm doing great! How about you?
                    </p>
                    <span class="message-time">
                        10:36 AM
                    </span>
                </div>
            </div> -->
        </div>

        <div class="message-input-container">
            <div class="message-input-wrapper">
                <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="send-message-btn">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
