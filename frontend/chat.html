<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-details">
                    <h3 id="username">Username</h3>
                    <p id="status">Online</p>
                </div>
            </div>
            <div class="sidebar-actions">
                <button id="logout-btn">
                   <i data-lucide="log-out"></i>
                </button>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="conversation-search" placeholder="Search conversations...">
        </div>
        <div class="conversation-list" id="conversation-list">
        </div>
        <button id="new-conversation-btn">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-info">
                <div class="chat-avatar" id="chat-avatar">
                    A
                </div>

                <div class="chat-details">
                    <h2 id="chat-name">Select a Conversation</h2>
                    <p id="chat-status">No conversation selected</p>
                </div>
            </div>
            <div class="chat-actions">
                <button id="add-member-btn">
                    <i data-lucide="user-plus"></i>
                </button>
                <button type="button" id="chat-menu-btn">
                    <i data-lucide="ellipsis-vertical"></i>
                </button>
            </div>
        </div>
        <div class="messages-container" id="messages-container">
            <div class="empty-chat" id="empty-chat">
                <div class="empty-chat-icon">
                    💬
                </div>
                <h2>Select a Conversation</h2>
                <p>
                    Choose a conversation from the sidebar
                    or create a new one.
                </p>
            </div>
        </div>
        <div class="message-input-container">
            <div class="message-input-wrapper">
                <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button type="button" id="send-message-btn">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="chat-menu" class="chat-menu hidden">
        <button id="group-info-option"><i data-lucide="users"></i></i>Group Info</button>
        <button id="rename-group-option"><i data-lucide="pencil"></i>Rename Group</button>
        <button id="add-member-option"><i data-lucide="user-plus"></i>Add Member</button>
        <button id="leave-group-option" class="danger"><i data-lucide="log-out"></i>Leave Group</button>
        <button id="delete-conversation-option" class="danger"><i data-lucide="trash-2"></i>Delete Conversation</button>
    </div>

    <div id="new-conversation-modal" class="modal hidden">
        <div class="modal-content">
            <h2>New Conversation</h2>
            <div class="conversation-type">
                <label>
                    <input
                        type="radio"
                        name="conversation-type"
                        value="private"
                        checked
                    >
                    Private Chat
                </label>
                <label>
                    <input
                        type="radio"
                        name="conversation-type"
                        value="group"
                    >
                    Group Chat
                </label>
            </div>
            <div id="group-name-container" class="hidden">
                <input
                    id="group-name"
                    placeholder="Group Name"
                >
            </div>
            <input
                id="user-search"
                placeholder="Search user..."
            >
            <div id="users-list"></div>
            
            <div class="modal-actions">
                <button id="cancel-new-chat-btn">
                    Cancel
                </button>
                <button id="create-conversation-btn" disabled>
                    Create
                </button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
